<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LedgerLock - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Sora:wght@600;700&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#00e676",
                        "on-surface-variant": "#bacbb9",
                        "surface-container-lowest": "#081009",
                        "on-primary-fixed": "#00210b",
                        "surface-container-low": "#151e16",
                        "surface-container-high": "#232c24",
                        "surface-bright": "#323c33",
                        "on-error": "#690005",
                        "surface-variant": "#2e372e",
                        "surface-container-highest": "#2e372e",
                        "primary-fixed-dim": "#00e475",
                        "secondary-fixed": "#e2e2e2",
                        "tertiary-fixed-dim": "#c0c7d3",
                        "secondary-container": "#454747",
                        "surface-tint": "#00e475",
                        "tertiary": "#dee5f2",
                        "secondary-fixed-dim": "#c6c6c7",
                        "primary-fixed": "#62ff96",
                        "on-primary-container": "#00612e",
                        "on-background": "#dbe5d9",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#005226",
                        "inverse-surface": "#dbe5d9",
                        "outline-variant": "#3b4a3d",
                        "inverse-primary": "#006d35",
                        "surface": "#0d150e",
                        "on-tertiary-fixed": "#151c25",
                        "on-secondary": "#2f3131",
                        "outline": "#859585",
                        "surface-dim": "#0d150e",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#c2c9d5",
                        "on-secondary-fixed": "#1a1c1c",
                        "secondary": "#c6c6c7",
                        "on-tertiary-container": "#4d545f",
                        "on-surface": "#dbe5d9",
                        "tertiary-fixed": "#dce3f0",
                        "surface-container": "#19221a",
                        "primary": "#75ff9e",
                        "on-primary": "#003918",
                        "error-container": "#93000a",
                        "background": "#0d150e",
                        "on-secondary-fixed-variant": "#454747",
                        "inverse-on-surface": "#29332a",
                        "on-secondary-container": "#b4b5b5",
                        "on-tertiary": "#2a313b",
                        "on-tertiary-fixed-variant": "#404752"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xl": "80px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "xs": "4px",
                        "md": "24px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "display-lg": ["Sora"],
                        "body-md": ["Inter"],
                        "headline-md": ["Sora"],
                        "numeric-data": ["Inter"],
                        "headline-lg": ["Sora"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Sora"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "numeric-data": ["16px", { "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0B0D;
            color: #dbe5d9;
        }
        .form-input {
            background-color: #0A0B0D;
            border-color: #3b4a3d;
            color: #dbe5d9;
        }
        .form-input:focus {
            border-color: #00e676;
            box-shadow: none;
            outline: none;
        }
    </style>
    <script src="/config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-background antialiased">
    <main class="w-full max-w-md">
        <div class="bg-surface-container border border-outline-variant rounded-lg shadow-[0_8px_24px_rgba(0,0,0,0.5)] overflow-hidden">
            <div class="p-lg flex flex-col items-center border-b border-outline-variant cursor-pointer" onclick="window.location.href='/'">
                <img alt="LedgerLock Logo" class="w-16 h-16 rounded-md mb-md" src="/ledgerlock_logo.png"/>
                <h1 class="font-headline-lg text-headline-lg text-on-surface">Create Account</h1>
                <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Precision Trust. Absolute Security.</p>
            </div>
            <div class="p-lg">
                <!-- Status/Error Notification Banner -->
                <div id="statusBanner" class="bg-error-container/20 border border-error/50 rounded-DEFAULT p-sm mb-md flex items-start gap-sm hidden">
                    <span class="material-symbols-outlined text-error text-[20px] shrink-0" id="statusIcon">error</span>
                    <p id="statusMessage" class="font-body-sm text-body-sm text-error">An error occurred.</p>
                </div>

                <form id="signupForm" class="space-y-md">
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface-variant mb-base" for="email">Email Address</label>
                        <input class="w-full bg-[#0A0B0D] border border-outline-variant rounded-DEFAULT p-sm font-body-md text-on-surface focus:ring-0" id="email" name="email" placeholder="user@domain.com" required type="email"/>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface-variant mb-base" for="password">Password</label>
                        <input class="w-full bg-[#0A0B0D] border border-outline-variant rounded-DEFAULT p-sm font-body-md text-on-surface focus:ring-0" id="password" name="password" placeholder="••••••••" required type="password"/>
                        <div class="mt-sm space-y-xs">
                            <div class="flex justify-between items-center">
                                <span class="font-label-md text-label-md text-on-surface-variant">Security Level</span>
                                <span class="font-label-md text-label-md text-on-surface-variant" id="pwd-strength-text"></span>
                            </div>
                            <div class="flex gap-xs h-1 w-full rounded-full overflow-hidden bg-surface">
                                <div class="w-1/3 bg-surface transition-all duration-300"></div>
                                <div class="w-1/3 bg-surface transition-all duration-300"></div>
                                <div class="w-1/3 bg-surface transition-all duration-300"></div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block font-label-md text-label-md text-on-surface-variant mb-base" for="confirm-password">Confirm Password</label>
                        <input class="w-full bg-[#0A0B0D] border border-outline-variant rounded-DEFAULT p-sm font-body-md text-on-surface focus:ring-0" id="confirm-password" name="confirm-password" placeholder="••••••••" required type="password"/>
                        <p id="passwordMismatchError" class="font-body-sm text-body-sm text-error mt-xs hidden">Passwords do not match.</p>
                    </div>
                    <button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-sm px-md rounded-DEFAULT hover:opacity-90 transition-opacity" type="submit">
                        Create Account
                    </button>
                </form>
            </div>
            <div class="bg-surface-dim p-md text-center border-t border-outline-variant">
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary hover:underline transition-all" href="/login.html">Log in</a>
                </p>
            </div>
        </div>
        <div class="mt-lg text-center w-full">
            <p class="font-body-sm text-body-sm text-on-surface-variant max-w-sm mx-auto">
                LedgerLock is a demonstration system for educational purposes. No real currency is transacted.
            </p>
        </div>
    </main>
    <script>
        // Check if already logged in
        if (localStorage.getItem('accessToken')) {
            window.location.href = '/overview.html';
        }

        const pwdInput = document.getElementById('password');
        const confirmPwdInput = document.getElementById('confirm-password');
        const strengthText = document.getElementById('pwd-strength-text');
        const strengthBars = document.querySelectorAll('.flex.gap-xs.h-1 > div');
        const passwordMismatchError = document.getElementById('passwordMismatchError');
        const form = document.getElementById('signupForm');
        const statusBanner = document.getElementById('statusBanner');
        const statusMessage = document.getElementById('statusMessage');
        const statusIcon = document.getElementById('statusIcon');

        // Live Password Strength logic
        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            
            if (val.length >= 8) strength++;
            if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
            if (val.length >= 12 && /[^A-Za-z0-9]/.test(val)) strength++;

            strengthBars.forEach((bar, index) => {
                bar.className = 'transition-all duration-300 w-1/3 ';
                if (index < strength) {
                    if (strength === 1) bar.classList.add('bg-error');
                    else if (strength === 2) bar.classList.add('bg-secondary');
                    else bar.classList.add('bg-primary');
                } else {
                    bar.classList.add('bg-surface');
                }
            });

            if (strength === 0) { strengthText.textContent = ''; }
            else if (strength === 1) { strengthText.textContent = 'Weak'; strengthText.className = 'font-label-md text-label-md text-error'; }
            else if (strength === 2) { strengthText.textContent = 'Medium'; strengthText.className = 'font-label-md text-label-md text-[#c6c6c7]'; }
            else { strengthText.textContent = 'Strong'; strengthText.className = 'font-label-md text-label-md text-primary'; }
        });

        // Live confirm password check
        confirmPwdInput.addEventListener('input', () => {
            if (pwdInput.value !== confirmPwdInput.value) {
                passwordMismatchError.classList.remove('hidden');
            } else {
                passwordMismatchError.classList.add('hidden');
            }
        });

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusBanner.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = pwdInput.value;
            const confirmPassword = confirmPwdInput.value;

            if (password !== confirmPassword) {
                passwordMismatchError.classList.remove('hidden');
                return;
            }

            const API_BASE = window.ENV?.API_BASE_URL || localStorage.getItem('API_BASE_URL') || '';

            try {
                const response = await fetch(API_BASE + '/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    statusBanner.className = 'bg-primary/10 border border-primary/50 rounded-DEFAULT p-sm mb-md flex items-start gap-sm';
                    statusIcon.textContent = 'check_circle';
                    statusIcon.className = 'material-symbols-outlined text-primary text-[20px] shrink-0';
                    statusMessage.className = 'font-body-sm text-body-sm text-primary';
                    statusMessage.textContent = 'Account created successfully! Redirecting to login...';
                    statusBanner.classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    const errData = await response.json();
                    statusBanner.className = 'bg-error-container/20 border border-error/50 rounded-DEFAULT p-sm mb-md flex items-start gap-sm';
                    statusIcon.textContent = 'error';
                    statusIcon.className = 'material-symbols-outlined text-error text-[20px] shrink-0';
                    statusMessage.className = 'font-body-sm text-body-sm text-error';
                    statusMessage.textContent = errData.message || 'Registration failed.';
                    statusBanner.classList.remove('hidden');
                }
            } catch (err) {
                statusBanner.className = 'bg-error-container/20 border border-error/50 rounded-DEFAULT p-sm mb-md flex items-start gap-sm';
                statusIcon.textContent = 'error';
                statusIcon.className = 'material-symbols-outlined text-error text-[20px] shrink-0';
                statusMessage.className = 'font-body-sm text-body-sm text-error';
                statusMessage.textContent = 'Connection error. Please try again.';
                statusBanner.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
