spring:
  profiles:
    active: dev
  application:
    name: ledgerlock

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/ledgerlock}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:#Jeyaguru064}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

# Security & JWT Configuration
jwt:
  secret: ${JWT_SECRET:9a4f2c8d3e7b1a5c6d8e7f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c}
  access-expiration-ms: 900000 # 15 minutes
  refresh-expiration-ms: 604800000 # 7 days

# Application-specific Custom configs
app:
  admin-email: "admin@ledgerlock.com"
  cors:
    allowed-origins: "http://localhost:3000"
  demo-warning: "LedgerLock is a demonstration system for educational purposes. No real currency is transacted."

management:
  endpoints:
    web:
      exposure:
        include: health

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 900000 # 15 minutes
  refresh-expiration-ms: 604800000 # 7 days

app:
  admin-email: ${ADMIN_EMAIL:admin@ledgerlock.com}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  demo-warning: "LedgerLock is a demonstration system for educational purposes. No real currency is transacted."

management:
  endpoints:
    web:
      exposure:
        include: health
